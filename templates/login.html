<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Contas Full</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0f; --card: #16161f; --border: #1e1e2e; --accent: #7c3aed; --accent2: #06b6d4; --text: #e2e8f0; --muted: #64748b; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; }

/* Background efeito */
.bg-orbs { position: fixed; inset: 0; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; }
.orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; animation: drift 8s ease-in-out infinite; }
.orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation: drift 10s ease-in-out infinite reverse; }
@keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, 20px); } }

.login-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 3rem 2.5rem; width: 90%; max-width: 420px;
  position: relative; z-index: 1; text-align: center;
  box-shadow: 0 0 80px rgba(124,58,237,0.1);
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem; }
.tagline { color: var(--muted); font-size: 0.95rem; margin-bottom: 2.5rem; }

.features { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem; text-align: left; }
.feature { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
  background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.15);
  border-radius: 12px; font-size: 0.9rem; }
.feature-icon { font-size: 1.2rem; }

.tg-btn {
  display: flex; align-items: center; justify-content: center; gap: 0.75rem;
  width: 100%; padding: 0.9rem; border-radius: 12px;
  background: linear-gradient(135deg, #0088cc, #006aaa);
  color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
  border: none; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.tg-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,136,204,0.3); }

.divider { color: var(--muted); font-size: 0.8rem; margin: 1.5rem 0; }
.footer-note { color: var(--muted); font-size: 0.8rem; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div class="login-box">
  <div class="logo">⚡ Contas Full</div>
  <div class="tagline">A melhor loja de contas digitais</div>

  <div class="features">
    <div class="feature"><span class="feature-icon">📦</span> Entrega automática instantânea</div>
    <div class="feature"><span class="feature-icon">💰</span> Sistema de saldo com PIX</div>
    <div class="feature"><span class="feature-icon">🔒</span> Seguro e confiável</div>
  </div>

  <button class="tg-btn" onclick="loginTelegram()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.026 9.547c-.149.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.48 14.42l-2.95-.924c-.641-.204-.654-.641.136-.948l11.527-4.444c.535-.194 1.002.13.37.144z"/></svg>
    Entrar com Telegram
  </button>

  <div class="footer-note">Ao entrar, você concorda com nossos termos de uso.</div>
</div>

<script src="https://telegram.org/js/telegram-widget.js?22" async></script>
<script>
function loginTelegram() {
  function loginTelegram() {
  window.Telegram.Login.auth(
    { bot_id: "8708861181", request_access: true },
    async (data) => {
      if (!data) { alert('Login cancelado.'); return; }
      const r = await fetch('/auth/telegram', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const res = await r.json();
      if (res.ok) window.location.href = '/loja';
      else alert('Erro no login: ' + (res.error || 'Tente novamente'));
    }
  );
}
