<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Contas Full</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0a0f; --card: #16161f; --border: #1e1e2e; --accent: #7c3aed; --accent2: #06b6d4; --text: #e2e8f0; --muted: #64748b; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 3rem 2.5rem; width: 90%; max-width: 420px; text-align: center; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
.tagline { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
.features { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; text-align: left; }
.feature { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.15); border-radius: 12px; font-size: 0.9rem; }
.tg-btn { display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.9rem; border-radius: 12px; background: linear-gradient(135deg, #0088cc, #006aaa); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; text-decoration: none; }
.tg-btn:hover { opacity: 0.9; }
.note { color: var(--muted); font-size: 0.8rem; margin-top: 1rem; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">⚡ Contas Full</div>
  <div class="tagline">A melhor loja de contas digitais</div>
  <div class="features">
    <div class="feature"><span>📦</span> Entrega automática instantânea</div>
    <div class="feature"><span>💰</span> Sistema de saldo com PIX</div>
    <div class="feature"><span>🔒</span> Seguro e confiável</div>
  </div>
  <a href="https://t.me/CONTASFULL100_BOT?start=login" class="tg-btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-2.026 9.547c-.149.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.48 14.42l-2.95-.924c-.641-.204-.654-.641.136-.948l11.527-4.444c.535-.194 1.002.13.37.144z"/></svg>
    Abrir no Telegram para entrar
  </a>
  <div class="note">Clique para abrir o bot e depois volte ao site</div>
</div>
</body>
</html>
